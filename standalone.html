<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Wants to Be a Millionaire: Absurd Edition (Standalone)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --color-gold: #fbbf24;
            --color-blue: #1e3a8a;
            --color-blue-dark: #0f172a;
            --color-silver: #e2e8f0;
            --color-green: #22c55e;
            --color-red: #ef4444;
        }

        body {
            background: radial-gradient(circle at center, var(--color-blue), var(--color-blue-dark));
            color: white;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .game-button {
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.4) 100%);
            border: 2px solid #64748b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .game-button:hover:not(:disabled) {
            border-color: var(--color-gold);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            transform: scale(1.02);
        }

        .game-button:active:not(:disabled) { transform: scale(0.98); }

        .correct { background: linear-gradient(180deg, var(--color-green) 0%, #16a34a 100%) !important; border-color: white !important; }
        .incorrect { background: linear-gradient(180deg, var(--color-red) 0%, #b91c1c 100%) !important; border-color: white !important; }
        .pending { background: var(--color-gold) !important; color: #0f172a !important; border-color: white !important; }

        .question-box {
            background: linear-gradient(180deg, rgba(30,58,138,0.8) 0%, rgba(15,23,42,0.9) 100%);
            border: 2px solid var(--color-silver);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #wheel {
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.3));
            cursor: pointer;
            max-height: 60vh;
        }

        .timer-bar {
            height: 6px;
            background: var(--color-gold);
            width: 100%;
            transition: width 1s linear;
            box-shadow: 0 0 10px var(--color-gold);
        }

        .winner-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 4px solid var(--color-gold);
            transform: scale(1.1);
            animation: winnerPulse 2s infinite;
        }

        @keyframes winnerPulse {
            0% { box-shadow: 0 0 20px var(--color-gold); }
            50% { box-shadow: 0 0 50px var(--color-gold); }
            100% { box-shadow: 0 0 20px var(--color-gold); }
        }

        .bg-glow {
            position: absolute;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            filter: blur(60px);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow top-0 left-0"></div>
    <div class="bg-glow bottom-0 right-0" style="background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 70%);"></div>

    <!-- SCREEN 1: WHEEL -->
    <div id="screen-wheel" class="screen active p-4">
        <h1 class="text-4xl md:text-6xl font-black text-center mb-6 uppercase italic">
            <span class="text-white drop-shadow-md">WHO WANTS TO</span><br/>
            <span class="text-amber-400 drop-shadow-lg">ANSWER?</span>
        </h1>
        
        <div class="relative w-64 h-64 md:w-[320px] md:h-[320px] mb-8">
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 z-20 w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-white drop-shadow-lg"></div>
            <svg id="wheel" viewBox="0 0 100 100" class="w-full h-full rounded-full border-[8px] border-slate-300">
                <!-- Sections generated by JS -->
            </svg>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-amber-400 rounded-full border-4 border-white shadow-xl z-10"></div>
        </div>

        <button id="btn-spin" class="game-button px-12 py-4 text-2xl font-black rounded-full text-amber-400 uppercase tracking-widest">
            SPIN
        </button>

        <div id="winner-announcement" class="hidden fixed bottom-10 bg-slate-900 border-4 border-amber-400 px-12 py-5 rounded-full shadow-2xl z-50">
            <span id="winner-name" class="text-4xl font-black uppercase">MARIUS!</span>
        </div>
    </div>

    <!-- SCREEN 2: GRID -->
    <div id="screen-grid" class="screen p-4">
        <div class="text-center mb-4">
            <h2 class="text-lg font-bold opacity-70 uppercase tracking-widest">It's the turn of</h2>
            <div id="grid-winner-name" class="text-3xl md:text-4xl font-black text-amber-400">MARIUS!</div>
        </div>
        <div id="question-grid" class="grid grid-cols-3 gap-3 w-full max-w-md px-4">
            <!-- Buttons generated by JS -->
        </div>
    </div>

    <!-- SCREEN 3: QUIZ -->
    <div id="screen-quiz" class="screen px-4 py-6">
        <div class="w-full max-w-4xl">
            <div class="w-full bg-slate-800 rounded-full overflow-hidden mb-6 h-2">
                <div id="timer-bar" class="timer-bar"></div>
            </div>
            <div id="timer-text" class="text-center text-amber-400 font-black text-2xl mb-4">45</div>
            
            <div id="mystery-badge" class="hidden mx-auto mb-4 bg-red-600 text-white px-6 py-1 rounded-full font-black text-lg uppercase tracking-widest text-center shadow-lg w-fit">
                🚨 Mystery Bonus Question 🚨
            </div>
            <div class="question-box p-6 md:p-8 text-center mb-6 rounded-2xl">
                <div id="quiz-id" class="text-amber-400 font-bold uppercase tracking-widest mb-2 text-sm">Question 1</div>
                <h2 id="quiz-text" class="text-2xl md:text-3xl font-black leading-tight text-white">Question text here?</h2>
            </div>
            <div id="answer-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                <!-- Answers generated by JS -->
            </div>
            <div id="next-container" class="hidden mt-6 flex justify-center">
                <button id="btn-next" class="game-button correct px-12 py-3 rounded-full text-xl font-black uppercase tracking-widest text-white">Next ➔</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 4: END -->
    <div id="screen-end" class="screen p-8 text-center">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-12 uppercase italic">GAME OVER</h1>
        <div class="winner-card p-12 rounded-3xl max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold text-amber-400 uppercase tracking-widest mb-4">The Grand Champion is</h2>
            <div id="final-winner-name" class="text-6xl md:text-8xl font-black text-white mb-8 drop-shadow-lg">MARIUS</div>
            <div id="final-stats" class="text-xl text-slate-300 space-y-2">
                <!-- Stats injected here -->
            </div>
        </div>
        <button onclick="location.reload()" class="mt-12 text-amber-400 font-bold uppercase tracking-widest hover:underline text-xl">Reset Game</button>
    </div>

    <script>
        const questions = [
            { id: 1, title: "The Philosophy of Typos", text: "If a word is misspelled in the dictionary, how would we ever know?", answers: [{id: "A", text: "The French Academy explodes", isC: false}, {id: "B", text: "Google sends us a notification", isC: false}, {id: "C", text: "We never know and we live a lie", isC: true}, {id: "D", text: "Impossible, the dictionary is always right", isC: false}] },
            { id: 2, title: "Historical Hardware", text: "Why did Kamikaze pilots wear helmets?", answers: [{id: "A", text: "To protect the radio inside the helmet", isC: true}, {id: "B", text: "Because they were optimists", isC: false}, {id: "C", text: "To look stylish in photos", isC: false}, {id: "D", text: "So they wouldn't get hurt before the impact", isC: false}] },
            { id: 3, title: "Aviation Mysteries", text: "What color is the 'black box' of an airplane?", answers: [{id: "A", text: "Transparent", isC: false}, {id: "B", text: "Rainbow", isC: false}, {id: "C", text: "Black", isC: false}, {id: "D", text: "Bright Orange", isC: true}] },
            { id: 4, title: "Cosmic Commutes", text: "If a spaceship travels at the speed of light, do the headlights work?", answers: [{id: "A", text: "Yes, but you can’t see anything", isC: true}, {id: "B", text: "The bulb burns out instantly", isC: false}, {id: "C", text: "Only if you use high beams", isC: false}, {id: "D", text: "No, the light stays stuck in the bulb", isC: false}] },
            { id: 5, title: "Linguistic Irony", text: "Why is the word 'abbreviation' so long?", answers: [{id: "A", text: "To test the patience of busy people", isC: false}, {id: "B", text: "It’s a translation error from Latin", isC: false}, {id: "C", text: "So we can abbreviate it to 'abbrev.'", isC: false}, {id: "D", text: "Because linguists have a niche sense of humor", isC: true}] },
            { id: 6, title: "Party Aftermath", text: "Where do balloons go when they fly away into the sky?", answers: [{id: "A", text: "They form the asteroid belt", isC: false}, {id: "B", text: "They are recovered by NASA to save money", isC: false}, {id: "C", text: "They pop and turn into tiny pieces of plastic", isC: true}, {id: "D", text: "They go to clown heaven", isC: false}] },
            { id: 7, title: "The Snack Circuit (MYSTERY BONUS)", text: "If you plug a pickled cucumber directly into an electrical outlet, what happens?", isM: true, answers: [{id: "A", text: "It turns back into a regular cucumber", isC: false}, {id: "B", text: "It glows like a yellow lightbulb", isC: true}, {id: "C", text: "It trips the entire city's power grid", isC: false}, {id: "D", text: "It cooks a perfect hotdog", isC: false}] },
            { id: 8, title: "Farm Fashion", text: "Why don't sheep shrink when it rains?", answers: [{id: "A", text: "Their wool contains grease (lanolin) that repels water", isC: true}, {id: "B", text: "They wear invisible raincoats", isC: false}, {id: "C", text: "They do shrink, we just don't notice", isC: false}, {id: "D", text: "They drink the water before it touches their skin", isC: false}] },
            { id: 9, title: "The Ultimate Paradox", text: "If you try to fail, and you succeed, what have you done?", answers: [{id: "A", text: "A failure", isC: false}, {id: "B", text: "A success", isC: false}, {id: "C", text: "A glitch in the Matrix", isC: true}, {id: "D", text: "A nap", isC: false}] }
        ];

        let currentWinner = "";
        let playedQuestions = [];
        let currentRotation = 0;
        let currentQuestionId = null;
        let scores = { Marius: 0, Uzoma: 0, Public: 0 };
        let timerSeconds = 45;
        let timerInterval = null;

        const sections = ["Marius", "Uzoma", "Public"];
        const colors = ["#1e3a8a", "#16a34a", "#b91c1c"];

        const wheelSvg = document.getElementById('wheel');
        const btnSpin = document.getElementById('btn-spin');
        const winnerAnnounce = document.getElementById('winner-announcement');
        const winnerName = document.getElementById('winner-name');
        const gridWinnerName = document.getElementById('grid-winner-name');
        const questionGrid = document.getElementById('question-grid');
        const answerGrid = document.getElementById('answer-grid');
        const quizText = document.getElementById('quiz-text');
        const quizId = document.getElementById('quiz-id');
        const mysteryBadge = document.getElementById('mystery-badge');
        const nextContainer = document.getElementById('next-container');
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const finalWinnerName = document.getElementById('final-winner-name');
        const finalStats = document.getElementById('final-stats');

        function initWheel() {
            sections.forEach((s, i) => {
                const angle = 360 / sections.length;
                const start = i * angle;
                const end = (i + 1) * angle;
                const x1 = 50 + 50 * Math.cos((Math.PI * (start - 90)) / 180);
                const y1 = 50 + 50 * Math.sin((Math.PI * (start - 90)) / 180);
                const x2 = 50 + 50 * Math.cos((Math.PI * (end - 90)) / 180);
                const y2 = 50 + 50 * Math.sin((Math.PI * (end - 90)) / 180);
                
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", colors[i % colors.length]);
                path.setAttribute("stroke", "#0f172a");
                path.setAttribute("stroke-width", "0.5");
                
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", "50");
                text.setAttribute("y", "18");
                text.setAttribute("fill", "white");
                text.setAttribute("font-size", "5");
                text.setAttribute("font-weight", "900");
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("transform", `rotate(${start + angle/2} 50 50)`);
                text.textContent = s;
                
                g.appendChild(path);
                g.appendChild(text);
                wheelSvg.appendChild(g);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleSpin() {
            if (btnSpin.disabled) return;
            btnSpin.disabled = true;
            wheelSvg.style.cursor = "default";
            
            const spins = 5 + Math.random() * 5;
            const extra = Math.random() * 360;
            currentRotation += spins * 360 + extra;
            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const final = currentRotation % 360;
                const adjusted = (360 - final) % 360;
                const idx = Math.floor(adjusted / (360 / sections.length));
                currentWinner = sections[idx];
                
                winnerName.textContent = currentWinner + "!";
                winnerAnnounce.classList.remove('hidden');
                
                setTimeout(() => {
                    winnerAnnounce.classList.add('hidden');
                    startSelection();
                    btnSpin.disabled = false;
                    wheelSvg.style.cursor = "pointer";
                }, 2500);
            }, 4100);
        }

        btnSpin.onclick = handleSpin;
        wheelSvg.onclick = handleSpin;

        function startSelection() {
            gridWinnerName.textContent = currentWinner + "!";
            questionGrid.innerHTML = "";
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                const isPlayed = playedQuestions.includes(i);
                btn.className = `aspect-square rounded-xl text-3xl md:text-5xl font-black transition-all ${isPlayed ? 'bg-slate-800/50 text-slate-600 cursor-not-allowed opacity-50' : 'game-button text-white hover:text-amber-400'}`;
                if (!isPlayed) {
                    btn.onclick = () => startQuiz(i);
                }
                questionGrid.appendChild(btn);
            }
            showScreen('screen-grid');
        }

        function startQuiz(id) {
            currentQuestionId = id;
            const q = questions.find(x => x.id === id);
            quizId.textContent = `Question ${q.id}: ${q.title}`;
            quizText.textContent = q.text;
            mysteryBadge.classList.toggle('hidden', !q.isM);
            nextContainer.classList.add('hidden');
            answerGrid.innerHTML = "";
            
            q.answers.forEach(a => {
                const btn = document.createElement('button');
                btn.className = "game-button p-4 md:p-5 rounded-full text-lg md:text-xl font-bold flex items-center space-x-4 text-white text-left";
                btn.innerHTML = `<span class="text-amber-400 font-black shrink-0" translate="no">${a.id}:</span> <span>${a.text}</span>`;
                btn.onclick = () => handleAnswer(btn, a, q.answers);
                answerGrid.appendChild(btn);
            });
            showScreen('screen-quiz');
            startTimer(q.answers);
        }

        function startTimer(allAns) {
            clearInterval(timerInterval);
            timerSeconds = 45;
            updateTimerUI();
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerUI();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(null, { id: 'NONE' }, allAns);
                }
            }, 1000);
        }

        function updateTimerUI() {
            timerText.textContent = timerSeconds;
            timerBar.style.width = (timerSeconds / 45 * 100) + "%";
            if (timerSeconds <= 5) timerText.classList.add('text-red-500');
            else timerText.classList.remove('text-red-500');
        }

        function handleAnswer(clickedBtn, selectedAns, allAns) {
            clearInterval(timerInterval);
            document.querySelectorAll('#answer-grid button').forEach(b => b.disabled = true);
            if (clickedBtn) clickedBtn.classList.add('pending');
            
            const q = questions.find(x => x.id === currentQuestionId);
            
            setTimeout(() => {
                let isCorrect = false;
                document.querySelectorAll('#answer-grid button').forEach((btn, idx) => {
                    const ans = allAns[idx];
                    btn.classList.remove('pending');
                    if (ans.isC) {
                        btn.classList.add('correct');
                        if (ans.id === selectedAns.id) isCorrect = true;
                    }
                    else if (ans.id === selectedAns.id) btn.classList.add('incorrect');
                    else btn.style.opacity = "0.3";
                });

                if (isCorrect) {
                    scores[currentWinner] += (q.isM ? 2 : 1);
                }

                nextContainer.classList.remove('hidden');
                if (!playedQuestions.includes(currentQuestionId)) {
                    playedQuestions.push(currentQuestionId);
                }
            }, 1500);
        }

        document.getElementById('btn-next').onclick = () => {
            if (playedQuestions.length === 9) {
                showEndScreen();
            } else {
                showScreen('screen-wheel');
            }
        };

        function showEndScreen() {
            let maxScore = -1;
            let winners = [];
            for (let name in scores) {
                if (scores[name] > maxScore) {
                    maxScore = scores[name];
                    winners = [name];
                } else if (scores[name] === maxScore) {
                    winners.push(name);
                }
            }

            finalWinnerName.textContent = winners.join(" & ");
            finalStats.innerHTML = `
                <p>Marius: ${scores.Marius} pts</p>
                <p>Uzoma: ${scores.Uzoma} pts</p>
                <p>Public: ${scores.Public} pts</p>
            `;
            showScreen('screen-end');
        }

        initWheel();
    </script>
</body>
</html>
